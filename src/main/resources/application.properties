spring.application.name=Student Profile
server.port=8080

# ─────────────────────────────────────────────
# PostgreSQL DataSource  (HikariCP connection pool)
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/itc475
spring.datasource.username=postgres
spring.datasource.password=Admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool settings
spring.datasource.hikari.pool-name=StudentProfilePool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ─────────────────────────────────────────────
# MyBatis
# ─────────────────────────────────────────────
# Enable camelCase mapping from snake_case DB columns (e.g. first_name → firstName)
mybatis.configuration.map-underscore-to-camel-case=true
# Location of mapper XML files (if any; we use annotation-based mappers here)
mybatis.mapper-locations=classpath:mappers/*.xml
# Log MyBatis SQL statements during development
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
