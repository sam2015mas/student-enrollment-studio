# Used only as a fallback/default profile for slice tests
# (@WebMvcTest) that don't touch the datasource at all.
# Live-DB integration tests (tagged requiresDatabase) override
# spring.datasource.* at runtime via @DynamicPropertySource against
# an ephemeral Testcontainers PostgreSQL instance instead of this file.
spring.application.name=Student Profile Test
mybatis.configuration.map-underscore-to-camel-case=true
